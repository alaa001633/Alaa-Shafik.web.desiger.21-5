<!DOCTYPE html>
<html lang="en">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css/h.css">
</head>
<body>
    <form>
        <label for="User Id" > User Id:</label>
        <input type="text" name="userid" id="userid" required maxlength="12" minlength="5">
        <br>
        <br>
        <label for="Password">Password:</label>
        <input type="password" name="password" id="password" required maxlength="12" minlength="7">
        <br>
        <br>
        <label for="Name">Name:</label>
        <input type="text" name="username" id="Name" required >
        <br>
        <br> 
        <label for="Address">Adress</label>
        <input type="text" name="adress" id="Adress">
        <br>
        <br>
        <label for="country">Country:</label>
       <select name="country" required id="country">
        <option value="0" >Egypt</option>
        <option value="1" >Italy</option>
        <option value="2" >America</option>
       </select>
       <br>
       <br>
       <label for="zip code" > ZIP Code:</label>
       <input type="text" name="zipcode" id="zip code" pattern="\d*" inputmode="numeric" >
       <br>
       <br>
       <label for="email">Email:</label>
       <input type="email" id="email" name="email" required>
       <br>
       <br>
       <label for="sex">sex:</label>
       <span>
        <input type="radio" id="sex" name="sex" required>
        male 
       </span>

       <span>
        <input type="radio" id="sex" name="sex" required>
        femal
       </span>
       <br>
       <br>
       <label for="language">Language:</label>
       <span>
        <input type="checkbox" id="language" name="language" required>
        English
       </span>

       <span>
        <input type="checkbox" id="language" name="language" required>
        Non English
       </span>
       <br>
       <br>
       <label for="text area"> About:</label>
       <textarea name="address" id="address" rows="10" cols="40"></textarea>
       <br>
       <br>
       <input type="submit" value="submit">
       

       </form>
